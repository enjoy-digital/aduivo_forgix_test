name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            wget \
            python3 \
            python3-pip \
            python3-setuptools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r requirements.txt

      - name: Run Python tests
        run: python3 -m unittest discover -s tests

      - name: Install LiteX
        run: |
          mkdir -p "$HOME/litex"
          cd "$HOME/litex"
          wget -q https://raw.githubusercontent.com/enjoy-digital/litex/master/litex_setup.py
          chmod +x litex_setup.py
          ./litex_setup.py --init --install --user --config=standard --clone-depth=1

      - name: Check LiteX target CLI
        run: |
          python3 -m litex_boards.targets.adiuvo_forgix --help | tee /tmp/adiuvo_forgix_help.txt
          grep -q -- "--with-spibone" /tmp/adiuvo_forgix_help.txt
